    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const root = document.querySelector('[data-composition-id="07-importacio-extracte-product-film-16x9"]');
        if (!root) return;

        const copy = root.querySelector("#summa-importacio-extracte-product-film-copy");
        const kicker = root.querySelector("#summa-importacio-extracte-product-film-kicker");
        const rule = root.querySelector("#summa-importacio-extracte-product-film-rule");
        const title = root.querySelector("#summa-importacio-extracte-product-film-title");
        const meta = root.querySelector("#summa-importacio-extracte-product-film-meta");
        const shots = Array.from(root.querySelectorAll(".summa-product-film-shot"));

        const scenes = [
          {
            shot: "entry",
            accent: "#7bb7ea",
            kicker: "Importació",
            title: "Importa l'extracte.",
            meta: "i prepara'l per conciliar.",
            copyWidth: 500,
            copyTop: 0,
            copyLeft: 0,
            fromScale: 1.05,
            toScale: 1.01,
            fromX: 180,
            toX: 124,
            fromY: -42,
            toY: -18,
            motionDuration: 3.8,
            copyFromX: -14,
            copyFromY: 12,
            copyOutX: 0,
            copyOutY: -8,
            textLead: 0.18,
            textTail: 0.7,
          },
          {
            shot: "account",
            accent: "#7bb7ea",
            kicker: "Compte",
            title: "Fixa el compte.",
            meta: "",
            copyWidth: 430,
            copyTop: 6,
            copyLeft: 0,
            fromScale: 1.04,
            toScale: 1.01,
            fromX: 74,
            toX: 40,
            fromY: -16,
            toY: -4,
            motionDuration: 3.2,
            copyFromX: 0,
            copyFromY: 18,
            copyOutX: 8,
            copyOutY: -6,
            textLead: 0.4,
            textTail: 0.74,
          },
          {
            shot: "preview",
            accent: "#7bb7ea",
            kicker: "Revisió",
            title: "Revisa resum i dates.",
            meta: "",
            copyWidth: 440,
            copyTop: 16,
            copyLeft: 0,
            fromScale: 1.08,
            toScale: 1.02,
            fromX: 138,
            toX: 82,
            fromY: 42,
            toY: 16,
            motionDuration: 2.9,
            copyFromX: -10,
            copyFromY: 24,
            copyOutX: 0,
            copyOutY: -10,
            textLead: 0.52,
            textTail: 0.78,
          },
          {
            shot: "warning",
            accent: "#d8a24a",
            kicker: "Duplicats",
            title: "Detecta solapaments.",
            meta: "",
            copyWidth: 420,
            copyTop: 24,
            copyLeft: 0,
            fromScale: 1.07,
            toScale: 1.02,
            fromX: 116,
            toX: 72,
            fromY: 18,
            toY: 0,
            motionDuration: 2.6,
            copyFromX: 10,
            copyFromY: 8,
            copyOutX: 0,
            copyOutY: -12,
            textLead: 0.48,
            textTail: 0.76,
          },
          {
            shot: "result",
            accent: "#6fc08e",
            kicker: "Resultat",
            title: "Queda llest per revisar.",
            meta: "amb menys risc d'error.",
            copyWidth: 460,
            copyTop: 12,
            copyLeft: 0,
            fromScale: 1.04,
            toScale: 1.005,
            fromX: 124,
            toX: 78,
            fromY: -18,
            toY: -6,
            motionDuration: 3.1,
            copyFromX: -8,
            copyFromY: 10,
            copyOutX: 0,
            copyOutY: 0,
            textLead: 0.42,
            textTail: 0.68,
          },
        ];

        const shotMap = new Map(
          shots.map((shot) => [shot.getAttribute("data-shot"), shot.querySelector("img")]),
        );

        function setScene(scene) {
          root.style.setProperty("--summa-film-accent", scene.accent);
          root.style.setProperty("--summa-film-copy-width", `${scene.copyWidth ?? 620}px`);
          root.style.setProperty("--summa-film-copy-top", `${scene.copyTop ?? 0}px`);
          root.style.setProperty("--summa-film-copy-left", `${scene.copyLeft ?? 0}px`);
          kicker.textContent = scene.kicker;
          title.textContent = scene.title;
          meta.textContent = scene.meta;
          meta.style.display = scene.meta ? "block" : "none";
        }

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const sceneDuration = 4.8;

        setScene(scenes[0]);

        scenes.forEach((scene, index) => {
          const start = index * sceneDuration;
          const shotEl = shotMap.get(scene.shot);
          const previousShotEl = index > 0 ? shotMap.get(scenes[index - 1].shot) : null;
          const textInAt = start + (scene.textLead ?? (index === 0 ? 0.18 : 0.34));
          const textOutAt = start + sceneDuration - (scene.textTail ?? 0.58);

          if (!shotEl) return;

          if (index > 0) {
            tl.call(() => setScene(scene), null, textInAt - 0.05);
          }

          tl.set(shotEl.parentElement, { opacity: 1 }, start);
          tl.fromTo(
            shotEl.parentElement,
            { opacity: index === 0 ? 1 : 0 },
            { opacity: 1, duration: 0.52, ease: "power2.out" },
            start,
          );
          tl.fromTo(
            shotEl,
            {
              scale: scene.fromScale,
              x: scene.fromX,
              y: scene.fromY,
            },
            {
              scale: scene.toScale,
              x: scene.toX,
              y: scene.toY,
              duration: scene.motionDuration ?? sceneDuration,
              ease: scene.motionEase ?? "power2.out",
            },
            start,
          );

          if (previousShotEl) {
            tl.to(previousShotEl.parentElement, { opacity: 0, duration: 0.46, ease: "power2.out" }, start + 0.08);
          }

          tl.fromTo(
            copy,
            {
              opacity: index === 0 ? 0 : 0.12,
              x: scene.copyFromX ?? 0,
              y: scene.copyFromY ?? (index === 0 ? 0 : 16),
            },
            { opacity: 1, x: 0, y: 0, duration: 0.4, ease: "power2.out" },
            textInAt,
          );
          tl.fromTo(
            rule,
            { scaleX: 0.45, transformOrigin: "left center" },
            { scaleX: 1, duration: 0.36, ease: "power2.out" },
            textInAt + 0.02,
          );
          tl.to(
            copy,
            {
              opacity: index === scenes.length - 1 ? 1 : 0.06,
              x: index === scenes.length - 1 ? 0 : (scene.copyOutX ?? 0),
              y: index === scenes.length - 1 ? 0 : (scene.copyOutY ?? -10),
              duration: 0.32,
              ease: "power2.in",
            },
            textOutAt,
          );
        });

        window.__timelines["07-importacio-extracte-product-film-16x9"] = tl;
      })();
    </script>
