<template id="summa-importacio-extracte-product-film-template">
  <div

    data-composition-id="07-importacio-extracte-product-film-16x9"
    data-start="0"
    data-width="1920"
    data-height="1080"
    data-duration="20"
  >
    <section id="summa-importacio-extracte-product-film-stage" aria-label="Importació d'extracte i conciliació dins de Summa">
      <div class="summa-product-film-shot" data-shot="shell">

      <div id="summa-importacio-extracte-product-film-copy" aria-hidden="true">

          <div class="summa-product-film-kicker">Conciliació</div>

          <p class="summa-product-film-meta">Importa l'extracte i deixa només les excepcions per validar.</p>
        </div>
        <div class="summa-product-film-caption" data-caption="result">
          <div class="summa-product-film-kicker">Resultat</div>
          <div class="summa-product-film-rule"></div>
          <h1 class="summa-product-film-title">Només queden les excepcions.</h1>
          <p class="summa-product-film-meta">La resta queda llesta per revisar.</p>
        </div>
      </div>
    </section>

    <style>
      [data-composition-id="07-importacio-extracte-product-film-16x9"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: linear-gradient(180deg, #eef3f8 0%, #e8edf3 100%);
        color: #0f1724;
        font-family: "Helvetica Neue", Arial, sans-serif;
      }

      #summa-importacio-extracte-product-film-stage {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        isolation: isolate;
      }

      .summa-product-film-shot,
      .summa-product-film-shot img,
      #summa-importacio-extracte-product-film-copy {
        position: absolute;
        inset: 0;
      }

      .summa-product-film-shot {
        opacity: 0;
        will-change: opacity;
      }

      .summa-product-film-shot img {
        width: 100%;
        height: 100%;
        inset: 0;
        object-fit: cover;
        object-position: center center;
        transform-origin: center center;
        will-change: transform, opacity;
        filter: saturate(1.01) contrast(1.01);
      }

      #summa-importacio-extracte-product-film-copy {
        z-index: 2;
        pointer-events: none;
      }

      .summa-product-film-caption {
        position: absolute;
        left: var(--summa-film-copy-left, 64px);
        bottom: var(--summa-film-copy-bottom, 68px);
        width: var(--summa-film-copy-width, 560px);
        display: flex;
        flex-direction: column;
        gap: 10px;
        opacity: 0;
        visibility: hidden;
        will-change: transform, opacity;
      }

      .summa-product-film-kicker {
        color: rgba(72, 93, 117, 0.9);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .summa-product-film-rule {
        width: 34px;
        height: 2px;
        border-radius: 999px;
        background: var(--summa-film-accent, #7bb7ea);
      }

      .summa-product-film-title {
        margin: 0;
        max-width: 540px;
        font-size: 52px;
        line-height: 0.98;
        letter-spacing: -0.048em;
        font-weight: 700;
        text-wrap: balance;
        color: #0f1724;
        text-shadow: 0 10px 24px rgba(255, 255, 255, 0.34);
      }

      .summa-product-film-meta {
        margin: 0;
        max-width: 500px;
        color: rgba(39, 53, 68, 0.88);
        font-size: 22px;
        line-height: 1.14;
        letter-spacing: -0.02em;
        text-shadow: 0 10px 24px rgba(255, 255, 255, 0.26);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const root = document.querySelector('[data-composition-id="07-importacio-extracte-product-film-16x9"]');
        if (!root) return;

        const shots = Array.from(root.querySelectorAll(".summa-product-film-shot"));
        const captions = Array.from(root.querySelectorAll(".summa-product-film-caption"));

        const scenes = [
          {
            shot: "shell",
            caption: "shell",
            accent: "#7bb7ea",
            copyWidth: 640,
            copyLeft: 64,
            copyBottom: 104,
            fromScale: 1.1,
            toScale: 1.16,
            fromX: 96,
            toX: 122,
            fromY: 22,
            toY: 8,
            motionDuration: 4.9,
            objectPosition: "50% 50%",
            copyInAt: 0.34,
            copyOutAt: 3.96,
          },
          {
            shot: "account",
            accent: "#7bb7ea",
            fromScale: 1.2,
            toScale: 1.26,
            fromX: 6,
            toX: 0,
            fromY: -6,
            toY: 0,
            motionDuration: 4.9,
            objectPosition: "50% 50%",
          },
          {
            shot: "warning",
            accent: "#d8a24a",
            fromScale: 1.16,
            toScale: 1.22,
            fromX: 0,
            toX: 0,
            fromY: 14,
            toY: 24,
            motionDuration: 4.9,
            objectPosition: "50% 44%",
          },
          {
            shot: "result",
            caption: "result",
            accent: "#6fc08e",
            copyWidth: 540,
            copyLeft: 64,
            copyBottom: 72,
            fromScale: 1.08,
            toScale: 1.12,
            fromX: 104,
            toX: 132,
            fromY: 0,
            toY: 18,
            motionDuration: 4.9,
            objectPosition: "50% 24%",
            copyInAt: 15.56,
          },
        ];

        const shotMap = new Map(
          shots.map((shot) => [shot.getAttribute("data-shot"), shot.querySelector("img")]),
        );
        const captionMap = new Map(
          captions.map((caption) => [caption.getAttribute("data-caption"), caption]),
        );

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const sceneDuration = 5;

        tl.set(captions, { opacity: 0, visibility: "hidden" }, 0);

        scenes.forEach((scene, index) => {
          const start = index * sceneDuration;
          const shotEl = shotMap.get(scene.shot);
          const captionEl = scene.caption ? captionMap.get(scene.caption) : null;
          const previousShotEl = index > 0 ? shotMap.get(scenes[index - 1].shot) : null;

          if (!shotEl) return;

          shotEl.style.objectPosition = scene.objectPosition ?? "50% 50%";

          tl.set(shotEl.parentElement, { opacity: 1 }, start);
          tl.fromTo(
            shotEl.parentElement,
            { opacity: index === 0 ? 1 : 0 },
            { opacity: 1, duration: 0.28, ease: "power2.out" },
            start,
          );
          tl.fromTo(
            shotEl,
            {
              scale: scene.fromScale,
              x: scene.fromX,
              y: scene.fromY,
            },
            {
              scale: scene.toScale,
              x: scene.toX,
              y: scene.toY,
              duration: scene.motionDuration ?? 4.9,
              ease: "power2.out",
            },
            start,
          );

          if (previousShotEl) {
            tl.to(previousShotEl.parentElement, { opacity: 0, duration: 0.24, ease: "power2.out" }, start + 0.03);
          }

          if (captionEl) {
            tl.set(
              captionEl,
              {
                visibility: "visible",
                "--summa-film-accent": scene.accent,
                "--summa-film-copy-width": `${scene.copyWidth ?? 560}px`,
                "--summa-film-copy-left": `${scene.copyLeft ?? 64}px`,
                "--summa-film-copy-bottom": `${scene.copyBottom ?? 68}px`,
              },
              start,
            );
            tl.fromTo(
              captionEl,
              {
                opacity: 0,
                x: 0,
                y: 16,
              },
              {
                opacity: 1,
                x: 0,
                y: 0,
                duration: 0.34,
                ease: "power2.out",
              },
              scene.copyInAt ?? (start + 0.3),
            );
            tl.fromTo(
              captionEl.querySelector(".summa-product-film-rule"),
              {
                scaleX: 0.4,
                transformOrigin: "left center",
              },
              {
                scaleX: 1,
                duration: 0.28,
                ease: "power2.out",
              },
              (scene.copyInAt ?? (start + 0.3)) + 0.02,
            );
            if (index < scenes.length - 1) {
              tl.to(
                captionEl,
                {
                  opacity: 0,
                  y: -10,
                  duration: 0.22,
                  ease: "power2.in",
                },
                scene.copyOutAt ?? (start + 3.96),
              );
              tl.set(captionEl, { visibility: "hidden" }, (scene.copyOutAt ?? (start + 3.96)) + 0.22);
            }
          }
        });

        window.__timelines["07-importacio-extracte-product-film-16x9"] = tl;
      })();
    </script>
  </div>
</template>
