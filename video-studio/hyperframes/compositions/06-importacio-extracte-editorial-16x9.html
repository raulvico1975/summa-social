        const stageFrame = root.querySelector("#summa-importacio-extracte-editorial-frame");
        const shadow = root.querySelector("#summa-importacio-extracte-editorial-shadow");

        const scenes = [
          {
            accent: "#1d9bf0",
            eyebrow: "Entrada",
            title: "Importa l'extracte des de Moviments.",
            meta: "El flux comença dins del compte que vols revisar.",

            meta: "El sistema et fa seleccionar el compte abans de continuar.",
            scale: 1.08,
            x: -36,

          },
          {
            accent: "#657186",
            eyebrow: "Revisió",
            title: "Revisa imports, dates i candidats abans de confirmar.",
            meta: "El resum et mostra què entrarà i què quedarà fora.",
            scale: 1.11,
            x: -38,

          {
            accent: "#1f9d63",
            eyebrow: "Resultat",
            title: "Quan acabes, la conciliació pot continuar.",
            meta: "Els moviments queden situats per seguir revisant.",
            scale: 1.02,
            x: 0,
            y: -72,
          },
        ];

        function setAccent(accent) {
          root.style.setProperty("--summa-accent", accent);
        }

        function setScene(scene) {
          setAccent(scene.accent);
          if (eyebrow) eyebrow.textContent = scene.eyebrow;
          if (title) title.textContent = scene.title;
          if (meta) meta.textContent = scene.meta;
        }

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        setScene(scenes[0]);
        tl.from(root, { opacity: 0, duration: 0.45, ease: "power2.out" }, 0);
        tl.from(headline, { opacity: 0, y: 12, duration: 0.45, ease: "power2.out" }, 0.05);
        tl.from(stageFrame, { opacity: 0, y: 18, duration: 0.55, ease: "power2.out" }, 0.08);
        tl.from(video, { opacity: 0, scale: 1.01, duration: 0.55, ease: "power2.out" }, 0.08);

        scenes.forEach((scene, sceneIndex) => {
          const start = sceneIndex * 6.14;
          const contentAt = start + (sceneIndex === 0 ? 0 : 0.16);

          if (sceneIndex > 0) {
            tl.to(headline, { opacity: 0.2, duration: 0.16, ease: "power1.in" }, start);
          }

          tl.call(() => setScene(scene), null, contentAt);
          tl.to(headline, { opacity: 1, duration: 0.3, ease: "power2.out" }, contentAt);
          tl.to(
            video,
            {
              scale: scene.scale,
              x: scene.x,
              y: scene.y,
              duration: 1.08,
              ease: "power2.out",
            },
            start
          );
          tl.to(
            stageFrame,
            {
              scale: sceneIndex === 3 ? 1.004 : 1,
              duration: 1.08,
              ease: "power2.out",
            },
            start
          );
          tl.to(shadow, { opacity: sceneIndex === 3 ? 0.96 : 1, duration: 0.7, ease: "power2.out" }, start);
        });

        window.__timelines["06-importacio-extracte-editorial-16x9"] = tl;
