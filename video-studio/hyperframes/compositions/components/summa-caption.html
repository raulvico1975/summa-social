<template id="summa-caption-template">
  <div
    data-composition-id="summa-caption"
    data-width="1920"
    data-height="1080"
    data-duration="12"
    data-timeline-role="captions"
    data-caption-root="true"
  >
    <div
      class="clip summa-caption-line"
      data-start="0"
      data-duration="3"
      data-track-index="0"
      data-slot="hook-text"
    ></div>
    <div
      class="clip summa-caption-line"
      data-start="3"
      data-duration="3"
      data-track-index="1"
      data-slot="problem-text"
    ></div>
    <div
      class="clip summa-caption-line"
      data-start="9"
      data-duration="3"
      data-track-index="2"
      data-slot="outcome-text"
    ></div>

    <style>
      [data-composition-id="summa-caption"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        color: #0f172a;
        pointer-events: none;
      }

      [data-composition-id="summa-caption"] .summa-caption-line {
        position: absolute;
        display: flex;
        align-items: flex-start;
        max-width: 760px;
        padding-top: 14px;
        border-top: 1px solid rgba(100, 116, 139, 0.36);
        font-size: 28px;
        line-height: 1.26;
        font-weight: 600;
        letter-spacing: -0.02em;
        opacity: 0;
      }

      [data-composition-id="summa-caption"][data-layout="landscape"] .summa-caption-line {
        left: 96px;
        bottom: 112px;
      }

      [data-composition-id="summa-caption"][data-layout="portrait"] .summa-caption-line {
        left: 78px;
        right: 78px;
        max-width: none;
        bottom: 224px;
        font-size: 30px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const root = document.querySelector('[data-composition-id="summa-caption"]');
        if (!root) return;

        const layout = root.getAttribute("data-layout") || "landscape";
        root.setAttribute("data-layout", layout);

        const lineEls = {};

        ["hook", "problem", "outcome"].forEach((key) => {
          const text = root.getAttribute(`data-${key}-text`) || "";
          const line = root.querySelector(`[data-slot="${key}-text"]`);
          if (!line) return;
          lineEls[key] = line;
          line.textContent = text;
          if (!text) line.style.display = "none";
        });

        const tl = gsap.timeline({ paused: true });
        const windows = {
          hook: { start: 0, end: 3 },
          problem: { start: 3, end: 6 },
          outcome: { start: 9, end: 12 },
        };

        tl.set(Object.values(lineEls), { autoAlpha: 0 }, 0);

        Object.entries(windows).forEach(([key, window]) => {
          const lineEl = lineEls[key];
          if (!lineEl) return;
          tl.set(lineEl, { autoAlpha: 1 }, window.start);
          tl.fromTo(
            lineEl,
            { opacity: 0, y: 10 },
            { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
            window.start + 0.08
          );
          tl.to(lineEl, { autoAlpha: 0, duration: 0.14, ease: "power1.in" }, window.end - 0.14);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["summa-caption"] = tl;
      })();
    </script>
  </div>
</template>
