<template id="summa-lower-third-template">
  <div
    data-composition-id="summa-lower-third"
    data-width="1920"
    data-height="1080"
    data-duration="3"
  >
    <div id="summa-lower-third-shell">
      <div id="summa-lower-third-label"></div>
      <div id="summa-lower-third-copy">
        <span id="summa-lower-third-highlight"></span>
        <span id="summa-lower-third-body"></span>
      </div>
    </div>

    <style>
      [data-composition-id="summa-lower-third"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        color: #17171c;
        pointer-events: none;
      }

      [data-composition-id="summa-lower-third"] #summa-lower-third-shell {
        position: absolute;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 720px;
        padding-top: 14px;
        border-top: 2px solid rgba(23, 23, 28, 0.82);
      }

      [data-composition-id="summa-lower-third"][data-layout="landscape"] #summa-lower-third-shell {
        left: 96px;
        bottom: 108px;
      }

      [data-composition-id="summa-lower-third"][data-layout="portrait"] #summa-lower-third-shell {
        left: 78px;
        right: 78px;
        max-width: none;
        bottom: 96px;
      }

      [data-composition-id="summa-lower-third"] #summa-lower-third-label {
        color: #586473;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      [data-composition-id="summa-lower-third"] #summa-lower-third-copy {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 24px;
        line-height: 1.32;
        font-weight: 600;
      }

      [data-composition-id="summa-lower-third"] #summa-lower-third-highlight {
        color: #0369a1;
        font-weight: 700;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const root = document.querySelector('[data-composition-id="summa-lower-third"]');
        if (!root) return;

        const layout = root.getAttribute("data-layout") || "landscape";
        root.setAttribute("data-layout", layout);

        const shellEl = root.querySelector("#summa-lower-third-shell");
        const labelEl = root.querySelector("#summa-lower-third-label");
        const highlightEl = root.querySelector("#summa-lower-third-highlight");
        const bodyEl = root.querySelector("#summa-lower-third-body");

        if (labelEl) labelEl.textContent = root.getAttribute("data-label") || "Acció";
        if (highlightEl) highlightEl.textContent = root.getAttribute("data-highlight") || "";
        if (bodyEl) bodyEl.textContent = root.getAttribute("data-copy") || "";

        const tl = gsap.timeline({ paused: true });
        if (shellEl) {
          tl.from(shellEl, {
            opacity: 0,
            y: 18,
            duration: 0.38,
            ease: "power2.out",
          });
          tl.to(shellEl, { opacity: 1, duration: 2.46, ease: "none" });
          tl.to(shellEl, { opacity: 0, duration: 0.16, ease: "power1.in" });
        }

        window.__timelines = window.__timelines || {};
        window.__timelines["summa-lower-third"] = tl;
      })();
    </script>
  </div>
</template>
