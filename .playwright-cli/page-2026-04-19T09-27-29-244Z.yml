        - generic [ref=e101]:
          - paragraph [ref=e103]: Presentamos una actualización importante de Codex, que lo convierte en un socio más poderoso para los más de 3 millones de desarrolladores que lo utilizan cada semana para acelerar el trabajo en todo el ciclo de vida del desarrollo de software.
          - paragraph [ref=e105]: Codex ahora puede manejar tu ordenador a tu lado, trabajar con más herramientas y aplicaciones que usas a diario, generar imágenes, recordar tus preferencias, aprender de acciones previas y encargarse de tareas continuas y repetitivas. La aplicación Codex ahora incluye además una compatibilidad más amplia para flujos de trabajo de desarrollo, como revisar PR, ver múltiples archivos y terminales, conectarse a entornos de desarrollo remotos mediante SSH y un navegador integrado para iterar más rápido en diseños frontend, aplicaciones y videojuegos.
          - heading "Ampliar Codex más allá de la programación" [level=2] [ref=e109]
          - paragraph [ref=e111]: Con el uso del ordenador en segundo plano, Codex ahora puede utilizar todas las aplicaciones de tu ordenador al ver, hacer clic y escribir con su propio cursor. Varios agentes pueden trabajar en tu Mac en paralelo, sin interferir con tu propio trabajo en otras aplicaciones. Para los desarrolladores, esto resulta útil para iterar en cambios del frontend, probar aplicaciones o trabajar en aplicaciones que no exponen una API.
          - paragraph [ref=e121]: Codex también está empezando a funcionar de forma nativa con la web. La aplicación ahora incluye un navegador integrado, donde puedes comentar directamente en las páginas para dar instrucciones precisas al agente. Resulta útil a día de hoy para el desarrollo frontend y de videojuegos, y con el tiempo está previsto ampliarlo para que Codex pueda controlar por completo el navegador más allá de las aplicaciones web en localhost.
          - paragraph [ref=e131]:
            - text: Codex ahora puede usar
            - link "gpt-image-1.5⁠ (se abre en una ventana nueva)" [ref=e132] [cursor=pointer]:
              - /url: https://developers.openai.com/api/docs/models/gpt-image-1.5
              - generic [ref=e133]: gpt-image-1.5
              - text: ⁠
              - generic [ref=e134]: (se abre en una ventana nueva)
            - text: para generar y refinar imágenes. Combinado con capturas de pantalla y código, es útil para crear elementos visuales para conceptos de producto, diseños de frontend, maquetas y juegos dentro del mismo flujo de trabajo.
          - paragraph [ref=e144]: Además, lanzamos más de 90 complementos adicionales, que combinan habilidades, integraciones de aplicaciones y servidores MCP para dar a Codex más formas de obtener contexto y actuar en todas tus herramientas. Algunos de los nuevos complementos que los desarrolladores encontrarán más útiles incluyen Atlassian Rovo para ayudar a gestionar JIRA, CircleCI, CodeRabbit, GitLab Issues, Microsoft Suite, Neon by Databricks, Remotion, Render y Superpowers.
          - heading "Trabajar a lo largo del ciclo de vida del desarrollo de software" [level=2] [ref=e156]
          - paragraph [ref=e158]: La aplicación ahora incluye soporte para responder comentarios de revisión en GitHub, ejecutar varias pestañas del terminal y conectarse a entornos de desarrollo remotos por SSH en fase alfa. Además, permite abrir archivos directamente en la barra lateral con vistas previas enriquecidas de PDF, hojas de cálculo, presentaciones y documentos, y usar un nuevo panel de resumen para seguir los planes, fuentes y artefactos del agente.
          - paragraph [ref=e168]: "En conjunto, estas mejoras hacen que sea más rápido pasar por todas las etapas del ciclo de vida del desarrollo de software: escribir código, comprobar resultados, revisar cambios y colaborar con el agente en un solo espacio de trabajo."
          - heading "Mantén tu trabajo en marcha" [level=2] [ref=e172]
          - paragraph [ref=e174]: Hemos ampliado las automatizaciones para que se puedan reutilizar hilos de conversación existentes y conservar así el contexto ya acumulado. Codex ahora puede programarse tareas futuras y reactivarse automáticamente para continuar una tarea a largo plazo, incluso durante varios días o semanas.
          - paragraph [ref=e176]: Los equipos usan automatizaciones para todo, desde integrar pull requests abiertos hasta hacer seguimiento de tareas y mantenerse al tanto de conversaciones rápidas en herramientas como Slack, Gmail y Notion.
          - paragraph [ref=e186]: También lanzamos una vista previa de la memoria, que permite a Codex recordar contexto útil de experiencias previas, como preferencias personales, correcciones e información que ha costado tiempo recopilar. Así, las tareas futuras se completan más rápido y con un nivel de calidad que antes solo era posible mediante instrucciones personalizadas extensas.
          - paragraph [ref=e188]: Codex ahora también propone de forma proactiva tareas útiles para continuar desde donde lo dejaste. A partir del contexto de los proyectos, los complementos conectados y la memoria, Codex puede ahora sugerir cómo empezar la jornada o por dónde retomar un proyecto anterior. Por ejemplo, Codex puede identificar comentarios abiertos en Google Docs que requieren tu atención, extraer contexto pertinente de Slack, Notion y tu base de código, y después ofrecerte una lista priorizada de acciones.
          - heading "Disponibilidad" [level=2] [ref=e192]
          - paragraph [ref=e194]: Desde hoy, estas actualizaciones empiezan a implementarse para los usuarios de la aplicación de escritorio de Codex que inicien sesión con ChatGPT.
          - paragraph [ref=e196]: Las funciones de personalización, como las sugerencias contextuales y la memoria, estarán disponibles pronto para los usuarios de Enterprise, Edu, la UE y el Reino Unido. El uso de ordenadores está disponible inicialmente en macOS y pronto se ofrecerá a usuarios de la UE y el Reino Unido.
          - paragraph [ref=e198]:
            - text: Si ya usas Codex en el terminal o el editor, pruébalo en el resto de tu flujo de trabajo. Si aún no has probado Codex,
            - link "descarga la aplicación⁠" [ref=e199] [cursor=pointer]:
              - /url: /es-ES/codex/
              - generic [ref=e200]: descarga la aplicación
              - text: ⁠
            - text: para comenzar.
          - heading "Próximos pasos" [level=2] [ref=e204]
          - paragraph [ref=e206]: En apenas un año desde el lanzamiento de Codex, se han ampliado las formas en que los desarrolladores utilizan Codex. Los desarrolladores comienzan a usar Codex para escribir código y luego lo utilizan cada vez más para comprender sistemas, recopilar contexto, revisar trabajo, depurar problemas, coordinarse con sus compañeros de equipo y mantener en marcha trabajos de mayor duración.
          - paragraph [ref=e208]: Nuestra misión es garantizar que la IAG beneficie a toda la humanidad, lo que incluye reducir la brecha entre lo que las personas son capaces de imaginar y lo que pueden crear. Esta versión acerca Codex a las herramientas, los flujos de trabajo y las decisiones que intervienen en el desarrollo de software, y pronto habrá mucho más.
